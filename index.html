<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TV Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#12141c; --surface:#1b1e29; --surface2:#252939;
  --border:#2e3245; --border2:#3d4258;
  --text:#ffffff; --muted:#9a9fb5; --dim:#7d83a0;
  --yellow:#ffc72c; --green:#4ade80; --red:#f87171; --blue:#5cc4ff; --purple:#c49bff;
  --red-bg:#f8717120; --purple-bg:#c49bff20; --green-bg:#4ade8020;
  --cat-queue:#3987e5; --cat-active:#c98500; --cat-done:#008300; --cat-onhold:#9085e9; --cat-dropped:#e66767;
  --shadow: rgba(0,0,0,0.35);
  /* theme-independent: this one badge always reads gold, in either theme */
  --badge-yellow:#ffc72c; --badge-yellow-dim:#ffc72c22; --chip-ink:#14151c;
  color-scheme: dark;
}
:root[data-theme="light"] {
  --bg:#eef0f5; --surface:#ffffff; --surface2:#f2f4f8;
  --border:#e1e4ec; --border2:#cdd1e0;
  --text:#14151c; --muted:#3f435c; --dim:#5a5e82;
  --yellow:#b45309; --green:#15803d; --red:#dc2626; --blue:#0369a1; --purple:#7c3aed;
  --red-bg:#dc262622; --purple-bg:#7c3aed22; --green-bg:#15803d22;
  --cat-queue:#2a78d6; --cat-active:#eda100; --cat-done:#008300; --cat-onhold:#4a3aa7; --cat-dropped:#e34948;
  --shadow: rgba(20,24,40,0.10);
  color-scheme: light;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Nunito Sans',sans-serif;min-height:100vh;transition:background 0.15s,color 0.15s;}
h1,.gtitle,.yhead{font-family:'Poppins',sans-serif;}
main{max-width:1400px;margin:0 auto;padding:1.5rem 1.25rem 2rem;}

.appbar{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--border);padding:1.25rem 1.25rem 0.9rem;}
.appbar-inner{max-width:1400px;margin:0 auto;}
.appbar-top{display:flex;align-items:center;gap:0.6rem;margin-bottom:0.9rem;}
.header-icon{width:30px;height:30px;border-radius:8px;background:var(--badge-yellow);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
h1{flex:1;font-size:1.5rem;font-weight:800;letter-spacing:-0.02em;color:var(--text);}
.theme-toggle{background:var(--surface);border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:10px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color 0.15s,transform 0.15s;}
.theme-toggle:hover{border-color:var(--border2);transform:translateY(-1px);}
.theme-toggle:focus-visible{outline:2px solid var(--yellow);outline-offset:2px;}
.updated{font-size:0.72rem;color:var(--dim);margin-bottom:1.25rem;}
.sync-status{font-size:0.68rem;color:var(--dim);font-weight:600;margin-left:6px;}
.sync-status.warn{color:var(--yellow);}

.toolbar{display:flex;gap:0.6rem;flex-wrap:wrap;align-items:center;}
.search-wrap{position:relative;flex:1;min-width:180px;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:0.85rem;pointer-events:none;}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.5rem 0.75rem 0.5rem 2rem;color:var(--text);font-family:inherit;font-size:0.82rem;transition:border-color 0.15s;}
.search-input::placeholder{color:var(--dim);}
.search-input:focus{outline:none;border-color:var(--yellow);}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;}
.chip{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:0.7rem;font-weight:700;padding:0.42rem 0.75rem;border-radius:99px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:border-color 0.15s,color 0.15s,background 0.15s;}
.chip:hover{color:var(--text);border-color:var(--border2);}
.chip.active{background:var(--yellow);border-color:var(--yellow);color:var(--chip-ink);}
.chip:focus-visible,.clear-btn:focus-visible{outline:2px solid var(--yellow);outline-offset:2px;}

.stats-row{display:flex;gap:0.6rem;margin-bottom:1.1rem;flex-wrap:wrap;}
.stat{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--border);border-radius:12px;padding:0.7rem 1.1rem;text-align:center;min-width:76px;font-family:inherit;box-shadow:0 1px 2px var(--shadow);transition:border-color 0.15s,transform 0.15s;}
button.stat{cursor:pointer;color:inherit;}
button.stat:hover{transform:translateY(-2px);border-color:var(--border2);}
button.stat:focus-visible{outline:2px solid var(--yellow);outline-offset:2px;}
button.stat.active{border-color:var(--yellow);background:var(--surface2);}
.stat-n{font-family:'Poppins',sans-serif;font-size:1.35rem;font-weight:800;line-height:1;}
.stat-l{font-size:0.6rem;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:0.06em;font-weight:600;}

.breakdown{margin-bottom:1.6rem;}
.breakdown-bar{display:flex;height:10px;border-radius:6px;overflow:hidden;gap:2px;background:var(--surface2);}
.seg{height:100%;min-width:2px;position:relative;transition:filter 0.15s;}
.seg:hover{filter:brightness(1.15);}
.seg:hover::after{content:attr(data-tip);position:absolute;bottom:130%;left:50%;transform:translateX(-50%);background:var(--surface2);color:var(--text);font-size:0.62rem;font-weight:700;padding:4px 8px;border-radius:6px;white-space:nowrap;box-shadow:0 4px 12px var(--shadow);pointer-events:none;z-index:5;}
.legend-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.legend-item{display:flex;align-items:center;gap:6px;background:none;border:1px solid var(--border);color:var(--muted);font-size:0.68rem;font-weight:600;padding:4px 10px;border-radius:99px;cursor:pointer;font-family:inherit;transition:border-color 0.15s,color 0.15s;}
.legend-item:hover{color:var(--text);border-color:var(--border2);}
.legend-item.active{color:var(--text);border-color:var(--border2);background:var(--surface2);}
.legend-item .swatch{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.legend-item .legend-n{color:var(--dim);font-weight:700;}

.slabel{display:flex;align-items:center;gap:6px;font-size:0.78rem;font-weight:700;color:var(--text);margin-bottom:0.7rem;margin-top:1.6rem;}
.slabel:first-of-type{margin-top:0;}
.slabel .dot{width:7px;height:7px;border-radius:50%;background:var(--yellow);}
.slabel .count{color:var(--dim);font-weight:600;}
.results-head{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.clear-btn{background:none;border:1px solid var(--border);color:var(--muted);font-size:0.68rem;font-weight:700;padding:5px 10px;border-radius:8px;cursor:pointer;font-family:inherit;margin-top:1.6rem;height:fit-content;transition:border-color 0.15s,color 0.15s;}
.clear-btn:hover{color:var(--text);border-color:var(--border2);}
.show-list{display:flex;flex-direction:column;gap:8px;}
@media (min-width:720px){
  .show-list.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px;}
}

.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:row;box-shadow:0 1px 2px var(--shadow);transition:border-color 0.15s,transform 0.15s,background 0.15s;}
.card:hover{border-color:var(--border2);background:var(--surface2);transform:translateX(2px);}
.card.now{box-shadow:0 0 0 1.5px var(--badge-yellow-dim) inset;}
.card.dormant{opacity:0.55;}
.card.faded{opacity:0.6;}

.poster{width:52px;min-width:52px;height:74px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif;font-size:1.3rem;font-weight:800;margin:10px;flex-shrink:0;position:relative;overflow:hidden;}
.poster img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}

.card-content{flex:1;padding:0.65rem 0.9rem 0.65rem 0;display:flex;flex-direction:column;gap:6px;min-width:0;justify-content:center;}
.row1{display:flex;align-items:center;gap:0.5rem;min-width:0;}
.gtitle{flex:1;font-size:0.92rem;font-weight:700;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.qnum{font-family:'Poppins',sans-serif;font-size:0.75rem;color:var(--dim);font-weight:700;min-width:16px;}
.status-pill{font-size:0.58rem;font-weight:700;padding:2px 7px;border-radius:99px;white-space:nowrap;flex-shrink:0;text-transform:uppercase;letter-spacing:0.04em;}

.season-ep{font-family:'Poppins',sans-serif;font-size:0.7rem;font-weight:800;color:var(--chip-ink);background:var(--badge-yellow);padding:2px 8px;border-radius:6px;white-space:nowrap;flex-shrink:0;}
.net{font-size:0.6rem;font-weight:700;padding:2px 8px;border-radius:99px;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;}
.net::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;}
.watch-link{display:inline-flex;gap:4px;text-decoration:none;flex-shrink:0;}
.watch-link:focus-visible{outline:2px solid var(--yellow);outline-offset:2px;border-radius:99px;}
.watch-link:hover .net{filter:brightness(1.15);}
.sv-netflix{background:#e5091420;color:#ff5a63;}
.sv-disney{background:#113ccf20;color:#6c9bff;}
.sv-prime{background:#00a8e120;color:#5cc4ff;}
.sv-hulu{background:#1ce78320;color:#3ddc91;}
.sv-max{background:#8a5cf620;color:#b18cff;}
.sv-apple{background:#88888820;color:#b9bed4;}
.sv-paramount{background:#0064ff20;color:#5b9bff;}
.sv-peacock{background:#ffb80020;color:#ffc94d;}
.sv-other{background:var(--surface2);color:var(--muted);}
:root[data-theme="light"] .sv-netflix{background:#e5091418;color:#b1060f;}
:root[data-theme="light"] .sv-disney{background:#113ccf18;color:#1d4ed8;}
:root[data-theme="light"] .sv-prime{background:#00a8e118;color:#0369a1;}
:root[data-theme="light"] .sv-hulu{background:#1ce78320;color:#0f7a43;}
:root[data-theme="light"] .sv-max{background:#8a5cf618;color:#6d28d9;}
:root[data-theme="light"] .sv-apple{background:#88888818;color:#44485c;}
:root[data-theme="light"] .sv-paramount{background:#0064ff18;color:#0047b3;}
:root[data-theme="light"] .sv-peacock{background:#ffb80028;color:#8a5a00;}

.card-actions{display:flex;gap:6px;margin-top:2px;}
.action-btn{font-size:0.66rem;font-weight:700;padding:4px 9px;border-radius:99px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;font-family:inherit;transition:border-color 0.15s,color 0.15s,background 0.15s;white-space:nowrap;}
.action-btn:hover{color:var(--text);border-color:var(--border2);}
.action-btn:focus-visible{outline:2px solid var(--yellow);outline-offset:2px;}
.action-btn.primary{background:var(--badge-yellow);border-color:var(--badge-yellow);color:var(--chip-ink);}
.action-btn.primary:hover{filter:brightness(1.08);}
.action-btn.icon{padding:4px 8px;}

.edit-dialog{background:var(--surface);color:var(--text);border:1px solid var(--border2);border-radius:14px;padding:1.1rem;max-width:320px;width:90vw;box-shadow:0 12px 32px var(--shadow);}
.edit-dialog::backdrop{background:rgba(0,0,0,0.5);}
.edit-dialog h3{font-family:'Poppins',sans-serif;font-size:0.95rem;font-weight:700;margin-bottom:0.9rem;}
.edit-fields{display:flex;gap:10px;margin-bottom:1rem;}
.edit-fields label{flex:1;display:flex;flex-direction:column;gap:4px;font-size:0.68rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;}
.edit-fields input,.edit-fields select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0.5rem;color:var(--text);font-family:inherit;font-size:0.9rem;text-transform:none;}
.edit-fields input:focus,.edit-fields select:focus{outline:none;border-color:var(--yellow);}
.dialog-actions{display:flex;justify-content:flex-end;gap:8px;}

.hist-row{display:flex;align-items:baseline;gap:10px;padding:7px 2px;border-bottom:1px solid var(--border);font-size:0.78rem;}
.hist-row:last-child{border-bottom:none;}
.hist-time{color:var(--dim);font-size:0.64rem;font-weight:600;white-space:nowrap;min-width:62px;}
.hist-day{font-family:'Poppins',sans-serif;font-size:0.7rem;font-weight:800;color:var(--yellow);margin:0.9rem 0 0.3rem;letter-spacing:0.02em;}
.hist-day:first-child{margin-top:0;}
.hist-title{font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hist-action{color:var(--muted);font-size:0.72rem;white-space:nowrap;}

.row2{display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;}
.eps-pill{font-size:0.62rem;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--surface2);color:var(--muted);white-space:nowrap;}
.dormant-pill{font-size:0.6rem;font-weight:600;padding:2px 8px;border-radius:99px;background:var(--surface2);color:var(--dim);white-space:nowrap;}
.dropped-pill{font-size:0.6rem;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--red-bg);color:var(--red);white-space:nowrap;}
.caught-pill{font-size:0.6rem;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--green-bg);color:var(--green);white-space:nowrap;}
.waiting-pill{font-size:0.6rem;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--surface2);color:var(--muted);white-space:nowrap;}
.next-pill{font-size:0.6rem;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--badge-yellow-dim);color:var(--yellow);white-space:nowrap;}
.lp-pill,.queued-pill,.start-pill{font-size:0.62rem;color:var(--dim);font-weight:600;white-space:nowrap;}

.cr{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.78rem;font-weight:700;color:var(--muted);margin-top:1.6rem;user-select:none;background:none;border:none;font-family:inherit;padding:6px 2px;border-radius:8px;}
.cr:hover{color:var(--text);}
/* She's asked twice where her history is — give this one row visual weight so it reads
   as a section rather than another piece of chrome. */
.cr-primary{color:var(--text);font-size:0.85rem;}
.cr-primary .chev{color:var(--yellow);}
.cr:focus-visible{outline:2px solid var(--yellow);outline-offset:2px;}
.cr .chev{display:inline-block;transition:transform 0.2s ease;font-size:0.7rem;}
.cr[aria-expanded="true"] .chev{transform:rotate(90deg);}
.panel{animation:panelIn 0.18s ease;}
@keyframes panelIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.empty{color:var(--dim);font-size:0.85rem;padding:0.6rem 0;}

.bsec{margin-bottom:0.85rem;}
.blbl{font-size:0.64rem;color:var(--dim);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:5px;font-weight:700;}
.brow{display:flex;align-items:center;gap:8px;margin:4px 0;}
.bname{font-size:0.72rem;color:var(--muted);width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;font-weight:600;}
.btrack{flex:1;background:var(--surface2);border-radius:3px;height:5px;}
.bfill{height:5px;border-radius:3px;}
.bval{font-size:0.68rem;color:var(--dim);min-width:22px;text-align:right;font-weight:700;}

.hlg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:1rem 0;}
.hl{background:var(--surface2);border-radius:12px;padding:12px 14px;}
.hl-l{font-size:0.62rem;color:var(--dim);text-transform:uppercase;letter-spacing:0.05em;font-weight:700;}
.hl-v{font-family:'Poppins',sans-serif;font-size:0.85rem;font-weight:700;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hl-s{font-size:0.66rem;color:var(--muted);font-weight:600;}

.mg{margin-bottom:1.1rem;}
.mh{font-size:0.66rem;color:var(--dim);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;font-weight:700;}
.yg{margin-bottom:1.4rem;}
.yhead{font-size:1.05rem;font-weight:800;margin-bottom:8px;display:flex;align-items:baseline;gap:8px;}
.ysub{font-size:0.66rem;color:var(--dim);font-weight:600;}

.love-banner{background:var(--badge-yellow);color:var(--chip-ink);border-radius:14px;padding:1.5rem 1rem;margin-bottom:1.5rem;text-align:center;font-family:'Poppins',sans-serif;font-size:1.6rem;font-weight:800;box-shadow:0 6px 20px var(--shadow);}

.nr-banner{background:var(--badge-yellow);color:var(--chip-ink);border-radius:12px;padding:0.85rem 1rem;margin-bottom:1.25rem;display:flex;align-items:flex-start;gap:10px;box-shadow:0 4px 14px var(--shadow);}
.nr-banner-body{flex:1;}
.nr-banner-title{font-family:'Poppins',sans-serif;font-weight:800;font-size:0.85rem;margin-bottom:4px;}
.nr-banner-list{font-size:0.76rem;font-weight:600;line-height:1.6;}
.nr-dismiss{background:rgba(20,21,28,0.12);border:none;color:var(--chip-ink);font-weight:700;font-size:0.68rem;padding:5px 10px;border-radius:8px;cursor:pointer;font-family:inherit;flex-shrink:0;}
.nr-dismiss:hover{background:rgba(20,21,28,0.22);}

.pace-chart{display:flex;align-items:flex-end;gap:3px;height:70px;margin:0.5rem 0 4px;overflow-x:auto;padding-bottom:2px;}
.pace-bar-wrap{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:3px;flex-shrink:0;width:14px;height:100%;}
.pace-bar{width:9px;border-radius:2px 2px 0 0;background:var(--yellow);opacity:0.85;}
.pace-labels{display:flex;gap:3px;margin-bottom:1.1rem;overflow-x:auto;}
.pace-lbl{font-size:0.5rem;color:var(--dim);width:14px;flex-shrink:0;text-align:center;}
.rewatch-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:0.4rem;}
.rewatch-pill{font-size:0.62rem;font-weight:600;padding:3px 9px;border-radius:99px;background:var(--purple-bg);color:var(--purple);}
</style>
</head>
<body>
<div class="appbar">
  <div class="appbar-inner">
    <div class="appbar-top">
      <div class="header-icon" aria-hidden="true">📺</div>
      <h1>Steph's TV Log</h1>
      <button id="theme-toggle" class="theme-toggle" type="button" onclick="toggleTheme()" aria-label="Switch to light theme">🌙</button>
    </div>
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon" aria-hidden="true">⌕</span>
        <input id="search" type="search" class="search-input" placeholder="Search all shows…" oninput="setQuery(this.value)" aria-label="Search shows">
      </div>
      <div class="chip-row" id="chip-row" role="group" aria-label="Filter by status"></div>
      <button type="button" class="action-btn primary" onclick="openAddDialog()">+ Add show</button>
    </div>
  </div>
</div>
<main>
<p class="updated">Rebuilt from her TV Time export — real watch history, no filler <span id="sync-status" class="sync-status"></span></p>
<div class="love-banner">❤️ I love you spoose ❤️</div>
<div id="new-releases" style="display:none;"></div>
<div class="stats-row" id="stats"></div>
<div class="breakdown" id="breakdown"></div>

<div id="default-sections">
  <h2 class="slabel"><span class="dot" aria-hidden="true"></span>Ready to watch <span class="count" id="now-count"></span></h2>
  <div class="show-list grid" id="now"></div>
  <h2 class="slabel"><span class="dot" aria-hidden="true"></span>Up next</h2>
  <div class="show-list grid" id="queue"></div>
  <button class="cr" type="button" onclick="tog('cu')" aria-expanded="false" aria-controls="cu-panel"><span class="chev" aria-hidden="true">▶</span><span id="cu-lbl">Caught up (0)</span></button>
  <div id="cu-panel" class="panel" style="display:none;margin-top:0.75rem;"></div>
</div>

<div id="results-section" style="display:none;">
  <div class="results-head">
    <h2 class="slabel"><span class="dot" aria-hidden="true"></span>Results <span class="count" id="results-count"></span></h2>
    <button type="button" class="clear-btn" onclick="clearFilters()">✕ Clear</button>
  </div>
  <div class="show-list grid" id="results-list"></div>
</div>

<button class="cr cr-primary" type="button" onclick="tog('wh')" aria-expanded="false" aria-controls="wh-panel"><span class="chev" aria-hidden="true">▶</span><span id="wh-lbl">📖 What you've watched (0)</span></button>
<div id="wh-panel" class="panel" style="display:none;margin-top:0.75rem;"></div>
<button class="cr" type="button" onclick="tog('ar')" aria-expanded="false" aria-controls="ar-panel"><span class="chev" aria-hidden="true">▶</span><span id="ar-lbl">Archive (0)</span></button>
<div id="ar-panel" class="panel" style="display:none;margin-top:0.75rem;"></div>
<button class="cr" type="button" onclick="tog('yl')" aria-expanded="false" aria-controls="yl-panel"><span class="chev" aria-hidden="true">▶</span><span>Year log</span></button>
<div id="yl-panel" class="panel" style="display:none;margin-top:0.75rem;"></div>

<dialog id="edit-dialog" class="edit-dialog">
  <form method="dialog" onsubmit="saveEdit(event)">
    <h3 id="edit-title">Update progress</h3>
    <div class="edit-fields">
      <label>Season<input type="number" id="edit-season" min="1" required></label>
      <label>Episode<input type="number" id="edit-ep" min="1" required></label>
    </div>
    <div class="dialog-actions">
      <button type="button" class="action-btn" onclick="document.getElementById('edit-dialog').close()">Cancel</button>
      <button type="submit" class="action-btn primary">Save</button>
    </div>
  </form>
</dialog>

<dialog id="add-dialog" class="edit-dialog">
  <form method="dialog" onsubmit="saveAddShow(event)">
    <h3>Add a show</h3>
    <div class="edit-fields">
      <label>Title<input type="text" id="add-title" required maxlength="200"></label>
    </div>
    <div class="edit-fields">
      <label>Status
        <select id="add-status" onchange="onAddStatusChange()">
          <option value="watching">Watching</option>
          <option value="queue">Up next</option>
        </select>
      </label>
    </div>
    <div class="edit-fields" id="add-progress-fields">
      <label>Season<input type="number" id="add-season" min="1" value="1"></label>

    </div>
    <div class="dialog-actions">
      <button type="button" class="action-btn" onclick="document.getElementById('add-dialog').close()">Cancel</button>
      <button type="submit" class="action-btn primary">Add</button>
    </div>
  </form>
</dialog>

<script>
const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const NOW = new Date();
let open={ar:false,yl:false,vs:false,wh:false,cu:false};

// ─── Progress: everything she has changed since the TV Time export ──────────────
// One document rather than four keys, in the exact shape the sync Worker merges, so
// there's no translation layer between what's in the browser and what's committed to
// the repo. Theme is deliberately NOT in here — it's a per-device preference.
//
// Deletes record a {__deleted:true} tombstone instead of removing the key: the other
// device still has the entry, and a merge would otherwise resurrect it.
const PROGRESS_KEY='tvtracker-progress';
// A factory, not a shared constant. Spreading a shared object is a *shallow* copy, so
// every "fresh" doc would alias the same nested overrides/history objects — mutating one
// would quietly poison the template, and a wiped browser wouldn't really start empty.
const emptyProgress=()=>({version:1,overrides:{},customShows:{},history:[],dismissed:[]});
const nowIso=()=>new Date().toISOString();
const isLive=e=>e&&!e.__deleted;

// The pre-sync build kept these in four separate keys. Fold them in once, so nobody
// loses the progress they already had when this version lands.
function migrateLegacy(){
  const get=(k,fb)=>{ try{ return JSON.parse(localStorage.getItem(k))??fb; }catch(e){ return fb; } };
  const legacyOverrides=get('tvtracker-overrides',{});
  const legacyCustom=get('tvtracker-custom-shows',[]);
  const legacyHistory=get('tvtracker-history',[]);
  const legacyDismissed=get('tvtracker-dismissed-releases',[]);
  if(!Object.keys(legacyOverrides).length&&!legacyCustom.length&&!legacyHistory.length&&!legacyDismissed.length) return null;
  const stamp=nowIso();
  const doc={...emptyProgress(),history:legacyHistory,dismissed:legacyDismissed};
  for(const [id,v] of Object.entries(legacyOverrides)) doc.overrides[id]={...v,updatedAt:stamp};
  for(const g of legacyCustom) doc.customShows[g.id]={...g,updatedAt:stamp};
  return doc;
}
function loadProgress(){
  try{
    const raw=localStorage.getItem(PROGRESS_KEY);
    if(raw) return {...emptyProgress(),...JSON.parse(raw)};
  }catch(e){}
  const migrated=migrateLegacy();
  if(migrated){ try{ localStorage.setItem(PROGRESS_KEY,JSON.stringify(migrated)); }catch(e){} return migrated; }
  return emptyProgress();
}
let progress=loadProgress();
// `overrides` stays the name the rest of the page uses to test "has she touched this?".
let overrides=progress.overrides;

function saveProgress(){
  progress.overrides=overrides;
  try{ localStorage.setItem(PROGRESS_KEY,JSON.stringify(progress)); }catch(e){}
  queueSync();
}

function loadCustomShows(){ return Object.values(progress.customShows).filter(isLive); }
function loadHistory(){ return progress.history; }
function loadDismissed(){ return progress.dismissed; }

function liveShows(){
  const withOverride=g=>isLive(overrides[g.id])?{...g,...overrides[g.id]}:g;
  return [...SH.map(withOverride), ...loadCustomShows().map(withOverride)];
}
function todayStr(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function logHistory(entry){
  progress.history=[{...entry, at:nowIso()}, ...progress.history].slice(0,500);
  saveProgress();
}
function removeHistoryForShow(id){
  progress.history=progress.history.filter(h=>h.id!==id);
  saveProgress();
}

function updateOverride(id,patch){
  overrides[id]={...(isLive(overrides[id])?overrides[id]:{}),...patch,updatedAt:nowIso()};
  saveProgress();
  render();
}
// True once she's watched the last episode of the last season TMDB knows about —
// i.e. there is nothing left to advance to. Returns false when we have no episode
// data for the show, so an unmatched show still behaves the old (permissive) way.
function isCaughtUp(g){
  const counts=EPISODE_COUNTS[g.id];
  if(!counts) return false;
  const seasons=Object.keys(counts).map(Number);
  if(!seasons.length||g.season==null||g.ep==null) return false;
  const lastSeason=Math.max(...seasons);
  // g.season>lastSeason catches progress the earlier rollover bug already pushed into a
  // season that never aired — those are saved in localStorage and outlive this fix.
  return g.season>lastSeason||(g.season===lastSeason&&g.ep>=counts[lastSeason]);
}
// Caught up is NOT the same as over. Conflating them is how we ended up offering to
// "Mark finished" Saturday Night Live — only TMDB's own status knows a show has stopped.
function hasEnded(g){
  const m=SHOW_META[g.id];
  return !!m&&(m.status==='Ended'||m.status==='Canceled');
}
// Caught up, but the show is still running — more is coming, it just hasn't aired.
// Unknown status counts as still-running: telling her to wait is recoverable, telling her
// a show is finished when it isn't loses it off her list.
function isWaiting(g){ return isCaughtUp(g)&&!hasEnded(g); }
// When the next episode is due, if TMDB has dated it.
function nextAirEl(g){
  const m=SHOW_META[g.id];
  if(!m||!m.nextAir||!m.nextAir.airDate) return '';
  if(m.nextAir.airDate<=todayStr()) return '';   // already aired; not "upcoming"
  return `<span class="next-pill">📅 S${m.nextAir.season}·E${m.nextAir.ep} ${fmtDateShort(m.nextAir.airDate)}</span>`;
}
function markWatched(id){
  const g=liveShows().find(x=>x.id===id);
  if(!g||isCaughtUp(g)) return;
  let season=g.season, ep=(g.ep||0)+1;
  const counts=EPISODE_COUNTS[id];
  const seasonLen=counts&&counts[season];
  if(seasonLen&&ep>seasonLen){
    // Only roll forward if that next season actually exists — otherwise we'd invent
    // a phantom season (Severance S3E1) that hasn't aired.
    if(counts[season+1]){ season=season+1; ep=1; }
    else return;
  }
  logHistory({id, title:g.t, action:'watched', season, ep});
  updateOverride(id,{season, ep, epsWatched:(g.epsWatched||0)+1, lastWatched:todayStr(), dormant:false});
}
// Moves a show out of "watching" and into the archive, stamped with this month so it
// lands in the right Year log / Archive group.
function markFinished(id){
  const g=liveShows().find(x=>x.id===id);
  if(!g) return;
  const d=new Date();
  logHistory({id, title:g.t, action:'finished', season:g.season, ep:g.ep});
  updateOverride(id,{s:'done', cy:d.getFullYear(), cm:d.getMonth(), dormant:false});
}
function startWatching(id){
  const g=liveShows().find(x=>x.id===id);
  if(!g) return;
  logHistory({id, title:g.t, action:'started', season:1, ep:1});
  updateOverride(id,{s:'watching', season:1, ep:1, epsWatched:1, lastWatched:todayStr(), start:todayStr(), dormant:false});
}
function resetShow(id){
  if(!isLive(overrides[id])) return;
  // Tombstone rather than delete: her other device still has this override, and a plain
  // delete would just come back on the next merge.
  overrides[id]={__deleted:true, updatedAt:nowIso()};
  removeHistoryForShow(id);
  saveProgress();
  render();
}
function removeCustomShow(id){
  if(!confirm('Remove this show you added? This can\'t be undone.')) return;
  progress.customShows[id]={__deleted:true, updatedAt:nowIso()};
  if(overrides[id]) overrides[id]={__deleted:true, updatedAt:nowIso()};
  removeHistoryForShow(id);
  saveProgress();
  render();
}
let editingId=null;
function openEdit(id){
  const g=liveShows().find(x=>x.id===id);
  if(!g) return;
  editingId=id;
  document.getElementById('edit-title').textContent=`Update progress — ${g.t}`;
  document.getElementById('edit-season').value=g.season||1;
  document.getElementById('edit-ep').value=g.ep||1;
  document.getElementById('edit-dialog').showModal();
}
function saveEdit(e){
  e.preventDefault();
  const season=parseInt(document.getElementById('edit-season').value,10);
  const ep=parseInt(document.getElementById('edit-ep').value,10);
  if(isNaN(season)||isNaN(ep)||season<1||ep<1) return;
  const g=liveShows().find(x=>x.id===editingId);
  if(g) logHistory({id:editingId, title:g.t, action:'edited', season, ep});
  updateOverride(editingId,{season, ep, lastWatched:todayStr(), dormant:false});
  document.getElementById('edit-dialog').close();
}

// ─── Add a show by hand ─────────────────────────────────
function openAddDialog(){
  document.getElementById('add-title').value='';
  document.getElementById('add-status').value='watching';
  document.getElementById('add-season').value=1;
  document.getElementById('add-ep').value=1;
  onAddStatusChange();
  document.getElementById('add-dialog').showModal();
}
function onAddStatusChange(){
  const isWatching=document.getElementById('add-status').value==='watching';
  document.getElementById('add-progress-fields').style.display=isWatching?'flex':'none';
}
function saveAddShow(e){
  e.preventDefault();
  const title=document.getElementById('add-title').value.trim();
  if(!title) return;
  const status=document.getElementById('add-status').value;
  const isWatching=status==='watching';
  const season=isWatching?Math.max(1,parseInt(document.getElementById('add-season').value,10)||1):null;
  const ep=isWatching?Math.max(1,parseInt(document.getElementById('add-ep').value,10)||1):null;
  const id=Date.now();
  progress.customShows[id]={
    id, t:title, s:status, season, ep, epsWatched:isWatching?ep:0,
    lastWatched:isWatching?todayStr():null, start:isWatching?todayStr():null,
    queued:status==='queue'?todayStr():null, cy:null, cm:null, dormant:false, custom:true,
    updatedAt:nowIso()
  };
  saveProgress();
  logHistory({id, title, action:isWatching?'added, watching':'added to Up next', season, ep});
  document.getElementById('add-dialog').close();
  render();
}

// ─── SHOW DATA — loaded async from shows.json (parsed from Steph's TV Time export) ──
// t=title, s=status(watching/queue/done/dropped), season/ep=most recent watched,
// epsWatched=total episodes watched, dormant=true if gap since lastWatched exceeds
// her own historical gap pattern for that show (not a flat cutoff — long between-season
// gaps that match her normal rhythm for a show are NOT flagged dormant).
// Kept in its own JSON file (rather than inline) so the GitHub Actions season-check job
// can read it without parsing this page.
let SH=[];
// Show id -> TMDB poster_path, populated by the same GitHub Actions job.
let POSTERS={};
// Show id -> {seasonNumber: episodeCount}, so "watched next" knows when to roll
// over into the next season instead of incrementing the episode number forever.
let EPISODE_COUNTS={};
// Show id -> {status, lastAired, nextAir} from TMDB. Distinguishes a show that has
// actually ENDED from one she's merely caught up on.
let SHOW_META={};

// ─── Real viewing-history stats, pulled from TV Time's own cached stats +
// historical timeframe counters (not derived/guessed) ──────────────────────
const MONTHLY_PACE=[
  {m:'2023-03', eps:86, hrs:54.4},
  {m:'2023-04', eps:94, hrs:60.1},
  {m:'2023-05', eps:67, hrs:46.1},
  {m:'2023-06', eps:103, hrs:60.4},
  {m:'2023-07', eps:98, hrs:62.3},
  {m:'2023-08', eps:99, hrs:58.7},
  {m:'2023-09', eps:86, hrs:46.7},
  {m:'2023-10', eps:71, hrs:38.9},
  {m:'2023-11', eps:63, hrs:37.7},
  {m:'2023-12', eps:60, hrs:42.2},
  {m:'2024-01', eps:69, hrs:45.4},
  {m:'2024-02', eps:52, hrs:36.7},
  {m:'2024-03', eps:53, hrs:31.9},
  {m:'2024-04', eps:74, hrs:48.8},
  {m:'2024-05', eps:129, hrs:90.5},
  {m:'2024-06', eps:66, hrs:49.8},
  {m:'2024-07', eps:53, hrs:31.1},
  {m:'2024-08', eps:41, hrs:23.1},
  {m:'2024-09', eps:52, hrs:21.4},
  {m:'2024-10', eps:33, hrs:25.5},
  {m:'2024-11', eps:26, hrs:13.8},
  {m:'2024-12', eps:24, hrs:12.5},
  {m:'2025-01', eps:8, hrs:5.5},
  {m:'2025-08', eps:44, hrs:23.0},
  {m:'2025-09', eps:34, hrs:24.0},
  {m:'2025-10', eps:41, hrs:22.0},
  {m:'2025-11', eps:43, hrs:30.0},
  {m:'2025-12', eps:39, hrs:27.0},
  {m:'2026-01', eps:38, hrs:23.0},
  {m:'2026-02', eps:27, hrs:14.0},
  {m:'2026-03', eps:36, hrs:26.0},
  {m:'2026-04', eps:26, hrs:12.0},
  {m:'2026-05', eps:29, hrs:16.0},
  {m:'2026-06', eps:41, hrs:30.0},
  {m:'2026-07', eps:29, hrs:21.0}
];
// Feb–Jul 2025 has no cached data in the export — gap is real, not zero-filled.
const MARATHONS=[
  {name:'Love is Blind', season:4, count:4},
  {name:'The Lord of the Rings: The Rings of Power', season:4, count:4},
  {name:'INVINCIBLE (2021)', season:4, count:3},
  {name:'The Night Agent', season:4, count:3}
];
const REWATCHED=["Blood & Treasure", "Broad City", "Inside Pixar", "Los Espookys", "Nancy Drew (2019)"];
// From user_statistics.csv — TV Time's own lifetime counters (not derived from the show list)
const LIFETIME={hoursWatched:7324, showsFollowedAllTime:1742, accountSince:'2017-10-22'};
// From user_badge.csv — tallied by badge type
const BADGES={marathoner:135, quickWatcher:40, serialWatcherTiers:4};

// ─── Helpers ──────────────────────────────────────────
// Escapes strings sourced from the CSV export before they're interpolated into innerHTML.
function esc(s){
  const d=document.createElement('div');
  d.textContent=s;
  return d.innerHTML;
}
const PALETTE_DARK=['#ffc72c','#5cc4ff','#c49bff','#4ade80','#ff8fa3','#ff9f5c'];
const PALETTE_LIGHT=['#b45309','#0369a1','#7c3aed','#15803d','#be123c','#c2410c'];
function posterColor(t){
  let h=0; for(let i=0;i<t.length;i++) h=(h*31+t.charCodeAt(i))>>>0;
  const palette=document.documentElement.getAttribute('data-theme')==='light'?PALETTE_LIGHT:PALETTE_DARK;
  return palette[h%palette.length];
}
// Where to stream it. Previously two shows had this hand-typed into shows.json (Fallout,
// Obi-Wan) which is why it looked like a feature that only worked sometimes — it came
// from TMDB's JustWatch data for all 339 shows now.
//
// TMDB (via JustWatch) returns every plan tier and reseller as its own "provider" — 72
// distinct names across her 339 shows — so the raw list reads badly: "Netflix" and
// "Netflix Standard with Ads" are the same answer, and live-TV bundles (fuboTV, YouTube
// TV, Philo) ride along on almost everything and crowd out the service she'd name.
//
// Deliberately done here rather than in the fetch job: this is a display judgement that
// will want tuning, and keeping the raw list in show-meta.json means changing our mind
// later doesn't mean re-fetching all 339 shows.

// "HBO Max Amazon Channel" is HBO Max, billed through Amazon.
const RESELLER_RE=/\s+(amazon|apple tv|roku premium|roku)\s+channel\s*$/i;
// Ad-supported tiers of the same service.
const TIER_RE=/\s+(standard\s+)?with\s+ads$/i;
const FREE_ADS_RE=/\s+free\s+with\s+ads$/i;

// Applied after the suffixes above are stripped, so "Peacock Premium Plus Amazon Channel"
// also lands on "Peacock". Keys are lowercase.
const SERVICE_ALIAS={
  'amazon prime video':'Prime Video','amazon video':'Prime Video',
  'disney plus':'Disney+',
  'apple tv':'Apple TV+','apple tv plus':'Apple TV+',
  'peacock premium':'Peacock','peacock premium plus':'Peacock',
  'paramount plus':'Paramount+','paramount plus premium':'Paramount+',
  'paramount plus essential':'Paramount+','paramount+':'Paramount+',
  'amc plus':'AMC+','amc+':'AMC+',
  'mgm plus':'MGM+','mgm+':'MGM+',
  'britbox':'BritBox','tubi tv':'Tubi','discovery +':'Discovery+',
  'the roku channel':'Roku Channel'
};

// Ranked buckets. A show on Netflix *and* YouTube TV should just say Netflix — the bundle
// is true but useless as an answer to "what can I put on tonight".
const LIVE_TV=new Set(['youtube tv','philo','fubotv','spectrum on demand','directv','sling tv']);
const FREE_SVC=new Set(['tubi','pluto tv','roku channel','xumo play','fandango at home free','freevee']);
// Channel-owned apps — a fine last resort, redundant when the show is also on a service.
const NETWORK=new Set(['nbc','tbs','tnt','usa network','freeform','pbs','pbs kids','history',
  'investigation discovery','disneynow','thirteen','kqed','weta+','fox one','angel studios',
  'the cw','a&e','bravo','syfy','amc','pure flix','ondemandkorea','youtube premium']);

function canonicalService(name){
  const raw=String(name||'').trim();
  // Check the raw name first: "The Roku Channel" is a service in its own right, and
  // stripping the reseller suffix off it would leave the word "The".
  const direct=SERVICE_ALIAS[raw.toLowerCase()];
  if(direct) return direct;
  const n=raw.replace(RESELLER_RE,'').replace(FREE_ADS_RE,'').replace(TIER_RE,'').trim();
  // A suffix strip that eats the whole name means the pattern didn't apply — keep the
  // original rather than emitting a fragment.
  if(!n) return raw;
  return SERVICE_ALIAS[n.toLowerCase()]||n;
}
function serviceTier(name){
  const k=name.toLowerCase();
  if(LIVE_TV.has(k)) return 3;
  if(NETWORK.has(k)) return 2;
  if(FREE_SVC.has(k)) return 1;
  return 0;   // a real subscription service — the answer she wants
}
// Collapses the raw list to the services worth naming, best tier only.
function watchServices(g){
  const w=SHOW_META[g.id]&&SHOW_META[g.id].watch;
  if(!w||!w.on||!w.on.length) return [];
  const seen=new Set(),out=[];
  // TMDB's ordering within a tier is a reasonable ranking, so keep first-seen.
  for(const raw of w.on){
    const name=canonicalService(raw);
    if(!name||seen.has(name.toLowerCase())) continue;
    seen.add(name.toLowerCase());
    out.push({name,tier:serviceTier(name)});
  }
  if(!out.length) return [];
  // Only the best tier present. Mixing them is what made Bluey read
  // "Disney+ · fuboTV · +2" when the honest answer is just Disney+.
  const best=Math.min(...out.map(s=>s.tier));
  return out.filter(s=>s.tier===best).map(s=>s.name);
}

// Brand colours for the ones she'd recognise; everything else gets a neutral pill rather
// than a wrong colour. Keyed on the canonical name.
const SERVICE_CLASS={
  'netflix':'sv-netflix','disney+':'sv-disney','prime video':'sv-prime','hulu':'sv-hulu',
  'hbo max':'sv-max','max':'sv-max','apple tv+':'sv-apple','paramount+':'sv-paramount','peacock':'sv-peacock'
};
function watchEl(g){
  const services=watchServices(g);
  if(!services.length) return '';
  const w=SHOW_META[g.id].watch;
  // Cap the row so it can't wrap on a phone. At exactly three, show all three — a "+1"
  // pill is the same width as the name it's hiding, so collapsing there buys nothing.
  const shown=services.length<=3?services:services.slice(0,2);
  const extra=services.length-shown.length;
  const pills=shown.map(name=>
    `<span class="net ${SERVICE_CLASS[name.toLowerCase()]||'sv-other'}">${esc(name)}</span>`
  ).join('');
  const more=extra?`<span class="net sv-other" title="${esc(services.slice(shown.length).join(', '))}">+${extra}</span>`:'';
  // The whole group links to TMDB's watch page, which stays right as deals move around.
  return w.link
    ? `<a class="watch-link" href="${esc(w.link)}" target="_blank" rel="noopener noreferrer" title="Where to watch ${esc(g.t)}">${pills}${more}</a>`
    : pills+more;
}
function posterEl(g){
  const color=posterColor(g.t);
  const letter=(g.t.match(/[A-Za-z0-9]/)||['#'])[0].toUpperCase();
  const path=POSTERS[g.id];
  const img=path?`<img src="https://image.tmdb.org/t/p/w185${path}" alt="" loading="lazy" onerror="this.style.display='none'">`:'';
  return `<div class="poster" style="background:${color}18;color:${color}" aria-hidden="true">${letter}${img}</div>`;
}
function seasonEpEl(g){
  if(g.season==null||g.ep==null) return '';
  return `<span class="season-ep">S${g.season} · E${g.ep}</span>`;
}
function epsPill(g){
  if(!g.epsWatched) return '';
  return `<span class="eps-pill">${g.epsWatched} ep${g.epsWatched===1?'':'s'} watched</span>`;
}
// "2026-07-15" -> local midnight. Plain `new Date("2026-07-15")` parses date-only
// strings as *UTC* midnight, which west of UTC lands on the previous evening — enough
// to make a show watched tonight report "watched yesterday" after ~8pm.
function parseDay(dateStr){
  const [y,mo,da]=dateStr.split('-').map(Number);
  return new Date(y,mo-1,da);
}
function daysSince(dateStr){
  if(!dateStr) return null;
  return Math.max(0, Math.floor((NOW-parseDay(dateStr))/(1000*60*60*24)));
}
// Clamps to NOW so a mistaken future-dated lastWatched value (data-entry typo)
// can't sort a show above ones genuinely watched today.
function effectiveDate(dateStr){
  if(!dateStr) return new Date(0);
  const d=parseDay(dateStr);
  return d>NOW?NOW:d;
}
function fmtDateShort(dateStr){
  if(!dateStr) return null;
  const [,mo,da]=dateStr.split('-');
  return M[parseInt(mo,10)-1]+' '+parseInt(da,10);
}
function startEl(g){
  if(!g.start) return '';
  return `<span class="start-pill">▷ started ${fmtDateShort(g.start)}</span>`;
}
function lastWatchedEl(g){
  if(!g.lastWatched) return '';
  const d=daysSince(g.lastWatched);
  if(d===null) return '';
  const label=d===0?'watched today':d===1?'watched yesterday':d<30?`watched ${d}d ago`:`watched ${fmtDateShort(g.lastWatched)}`;
  return `<span class="lp-pill">${label}</span>`;
}
function queuedEl(g){
  if(!g.queued) return '';
  return `<span class="queued-pill">followed ${fmtDateShort(g.queued)}</span>`;
}

// ─── Card builders ─────────────────────────────────────
function nowC(g){
  const hasOverride=!!overrides[g.id];
  const caught=isCaughtUp(g);
  const waiting=isWaiting(g);
  // Three states, not two. "Caught up" and "over" are different things: offering to
  // Mark finished on a show that's still running (Saturday Night Live!) is nonsense.
  // Both variants share one fkey so focus survives the label swap when a show flips
  // from watchable to caught-up mid-binge.
  const primary=!caught
    ? `<button type="button" class="action-btn primary" data-fkey="act-${g.id}" onclick="markWatched(${g.id})">✓ I watched this, bitch!</button>`
    : waiting
      ? `<button type="button" class="action-btn" data-fkey="act-${g.id}" onclick="markFinished(${g.id})">Stop following</button>`
      : `<button type="button" class="action-btn primary" data-fkey="act-${g.id}" onclick="markFinished(${g.id})">✓ Mark finished</button>`;
  return `<div class="card ${g.dormant?'dormant':'now'}">
    ${posterEl(g)}
    <div class="card-content">
      <div class="row1"><span class="gtitle">${esc(g.t)}</span>${seasonEpEl(g)}${watchEl(g)}</div>
      <div class="row2">
        ${epsPill(g)}
        ${startEl(g)}
        ${caught?(waiting?'<span class="waiting-pill">⏳ caught up</span>':'<span class="caught-pill">✓ series finished</span>'):''}
        ${nextAirEl(g)}
        ${g.dormant?'<span class="dormant-pill">💤 on hold</span>':lastWatchedEl(g)}
      </div>
      <div class="card-actions">
        ${primary}
        <button type="button" class="action-btn icon" onclick="openEdit(${g.id})" aria-label="Edit season and episode">✎</button>
        ${hasOverride?`<button type="button" class="action-btn icon" onclick="resetShow(${g.id})" aria-label="Reset to original snapshot">↺</button>`:''}
        ${g.custom?`<button type="button" class="action-btn icon" onclick="removeCustomShow(${g.id})" aria-label="Remove this show">🗑</button>`:''}
      </div>
    </div>
  </div>`;
}

function qC(g,n){
  return `<div class="card">
    ${posterEl(g)}
    <div class="card-content">
      <div class="row1">${n!=null?`<span class="qnum">${n}</span>`:''}<span class="gtitle">${esc(g.t)}</span>${watchEl(g)}</div>
      <div class="row2">
        ${queuedEl(g)}
        ${n==null?'<span class="dormant-pill">up next</span>':''}
        ${nextAirEl(g)}
      </div>
      <div class="card-actions">
        <button type="button" class="action-btn primary" onclick="startWatching(${g.id})">▶ Start watching</button>
        ${g.custom?`<button type="button" class="action-btn icon" onclick="removeCustomShow(${g.id})" aria-label="Remove this show">🗑</button>`:''}
      </div>
    </div>
  </div>`;
}

function aC(g,showStatus){
  const dropped=g.s==='dropped';
  return `<div class="card faded">
    ${posterEl(g)}
    <div class="card-content">
      <div class="row1"><span class="gtitle">${esc(g.t)}</span>${seasonEpEl(g)}</div>
      <div class="row2">
        ${g.cm!=null?`<span class="lp-pill">${M[g.cm]} ${g.cy}</span>`:''}
        ${epsPill(g)}
        ${dropped?'<span class="dropped-pill">dropped</span>':(showStatus?'<span class="dormant-pill">done</span>':'')}
      </div>
    </div>
  </div>`;
}

// Picks the right card style for a show regardless of status — used by search/filter results,
// which mix shows from every bucket (watching/queue/done/dropped) in one list.
function resultCard(g){
  if(g.s==='watching') return nowC(g);
  if(g.s==='queue') return qC(g,null);
  return aC(g,true);
}

// ─── Year stats ────────────────────────────────────────
function ystats(list){
  const totalEps=list.reduce((s,g)=>s+(g.epsWatched||0),0);
  let h=`<div class="bsec"><div class="blbl">Episodes watched</div><div class="hl-v" style="font-size:1.1rem;">${totalEps}</div></div>`;
  const bm={};list.forEach(g=>{if(g.cm!=null)bm[g.cm]=(bm[g.cm]||0)+1;});
  const mm=Math.max(...Object.values(bm),1);
  if(Object.keys(bm).length){h+=`<div class="bsec"><div class="blbl">Month</div>${Object.entries(bm).sort((a,b)=>a[0]-b[0]).map(([mo,c])=>`<div class="brow"><span class="bname">${M[mo]}</span><div class="btrack"><div class="bfill" style="width:${Math.round(c/mm*100)}%;background:var(--blue);opacity:0.7;"></div></div><span class="bval">${c}</span></div>`).join('')}</div>`;}
  const biggest=list.reduce((a,b)=>(a?.epsWatched||0)>=(b?.epsWatched||0)?a:b,null);
  if(biggest) h+=`<div class="hlg"><div class="hl"><div class="hl-l">Biggest binge</div><div class="hl-v">${esc(biggest.t)}</div><div class="hl-s">${biggest.epsWatched} episodes</div></div></div>`;
  return h;
}

// ─── Panels ────────────────────────────────────────────
function tog(k){
  open[k]=!open[k];
  document.getElementById(k+'-panel').style.display=open[k]?'block':'none';
  document.querySelector(`[aria-controls="${k}-panel"]`).setAttribute('aria-expanded', open[k]);
  render();
}
// The caught-up shows: watching, but nothing left to air. Collapsed by default and
// rendered with the normal watching card, so each one carries its "Mark finished"
// button and she can retire them at whatever pace she likes.
function renderCaughtUp(list){
  document.getElementById('cu-lbl').textContent=`Caught up (${list.length})`;
  const el=document.getElementById('cu-panel');
  // Throw the markup away when collapsed rather than just hiding it: 219 stale cards
  // would otherwise linger in the DOM carrying duplicate data-fkey values that focus
  // restoration could land on invisibly.
  if(!open.cu){ el.innerHTML=''; return; }
  el.innerHTML=list.length
    ?`<div class="show-list grid">${list.map(nowC).join('')}</div>`
    :'<div class="empty">Nothing caught up yet.</div>';
}

function renderHistoryPanel(){
  const history=[...loadHistory()].sort((a,b)=>new Date(b.at)-new Date(a.at));
  document.getElementById('wh-lbl').textContent=`📖 What you've watched (${history.length})`;
  if(!open.wh) return;
  const el=document.getElementById('wh-panel');
  if(!history.length){ el.innerHTML='<div class="empty">Nothing logged yet — every time you hit “I watched this”, it shows up here with the date, newest first.</div>'; return; }
  const actionLabel={watched:h=>`watched S${h.season}·E${h.ep}`, started:()=>'started watching', edited:h=>`set to S${h.season}·E${h.ep}`, finished:()=>'marked finished'};
  // Group by day so it reads as a diary rather than an undifferentiated list.
  let lastDay=null;
  el.innerHTML=history.map(h=>{
    const d=new Date(h.at);
    const day=`${M[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
    const dayHeader=day!==lastDay?`<div class="hist-day">${day===`${M[NOW.getMonth()]} ${NOW.getDate()}, ${NOW.getFullYear()}`?'Today':day}</div>`:'';
    lastDay=day;
    const when=d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
    const label=(actionLabel[h.action]||(()=>h.action))(h);
    return `${dayHeader}<div class="hist-row"><span class="hist-time">${when}</span><span class="hist-title">${esc(h.title)}</span><span class="hist-action">${esc(label)}</span></div>`;
  }).join('');
}

function renderPanels(){
  const shows=liveShows();
  renderHistoryPanel();
  const arch=shows.filter(g=>g.s==='done'||g.s==='dropped').sort((a,b)=>(b.cy||0)-(a.cy||0)||((b.cm??-1)-(a.cm??-1)));
  document.getElementById('ar-lbl').textContent=`Archive (${arch.length})`;
  if(open.ar){
    const bym={};
    arch.forEach(g=>{const k=`${g.cy||'?'}__${g.cm??'?'}`;if(!bym[k])bym[k]={year:g.cy,month:g.cm,shows:[]};bym[k].shows.push(g);});
    document.getElementById('ar-panel').innerHTML=Object.values(bym).sort((a,b)=>(b.year||0)-(a.year||0)||((b.month??-1)-(a.month??-1))).map(grp=>`<div class="mg"><div class="mh">${grp.month!=null?M[grp.month]+' '+grp.year:String(grp.year||'Unknown')}</div><div class="show-list grid">${grp.shows.map(g=>aC(g)).join('')}</div></div>`).join('');
  }
  if(open.yl){
    const fin=shows.filter(g=>(g.s==='done'||g.s==='dropped')&&g.cy);
    const by={};fin.forEach(g=>{(by[g.cy]=by[g.cy]||[]).push(g);});
    const yrs=Object.keys(by).sort((a,b)=>b-a);
    document.getElementById('yl-panel').innerHTML=yrs.length?yrs.map(yr=>{const list=by[yr];return `<div class="yg"><div class="yhead">${yr}<span class="ysub">${list.length} shows</span></div>${ystats(list)}<div class="show-list grid">${list.map(g=>aC(g)).join('')}</div></div>`;}).join(''):'<div class="empty">No archived shows yet.</div>';
  }
  if(open.vs){
    const maxEps=Math.max(...MONTHLY_PACE.map(p=>p.eps));
    const chart=MONTHLY_PACE.map(p=>`<div class="pace-bar-wrap"><div class="pace-bar" style="height:${Math.max(Math.round(p.eps/maxEps*60),2)}px" title="${p.m}: ${p.eps} episodes, ${p.hrs}h"></div></div>`).join('');
    const labels=MONTHLY_PACE.map((p,i)=>`<div class="pace-lbl">${i%3===0?p.m.slice(2):''}</div>`).join('');
    const totalEps=MONTHLY_PACE.reduce((s,p)=>s+p.eps,0);
    const totalHrs=MONTHLY_PACE.reduce((s,p)=>s+p.hrs,0);
    let h=`<div class="bsec"><div class="blbl">Monthly pace (Mar 2023 – Jul 2026, real data — Feb–Jul 2025 gap is unrecorded, not zero)</div>
      <div class="pace-chart">${chart}</div><div class="pace-labels">${labels}</div>
      <div class="hl-s">${totalEps.toLocaleString()} episodes · ${Math.round(totalHrs).toLocaleString()} hours across this window</div>
    </div>`;
    if(MARATHONS.length){
      h+=`<div class="bsec"><div class="blbl">Biggest marathons (TV Time's own calc)</div><div class="hlg">${MARATHONS.map(m=>`<div class="hl"><div class="hl-l">${esc(m.name)}</div><div class="hl-v">Season ${m.season}</div><div class="hl-s">${m.count} episodes in one day</div></div>`).join('')}</div></div>`;
    }
    if(REWATCHED.length){
      h+=`<div class="bsec"><div class="blbl">Rewatched at least one episode</div><div class="rewatch-row">${REWATCHED.map(n=>`<span class="rewatch-pill">${esc(n)}</span>`).join('')}</div></div>`;
    }
    h+=`<div class="bsec"><div class="blbl">Lifetime (TV Time's own account counters, since ${LIFETIME.accountSince})</div>
      <div class="hlg">
        <div class="hl"><div class="hl-l">Hours watched</div><div class="hl-v">${LIFETIME.hoursWatched.toLocaleString()}</div></div>
        <div class="hl"><div class="hl-l">Shows followed all-time</div><div class="hl-v">${LIFETIME.showsFollowedAllTime.toLocaleString()}</div><div class="hl-s">vs ${SH.length} in the current list — the rest were followed/unfollowed over the years</div></div>
      </div>
    </div>`;
    h+=`<div class="bsec"><div class="blbl">Badges earned</div>
      <div class="rewatch-row">
        <span class="rewatch-pill">🏃 ${BADGES.marathoner} Marathoner</span>
        <span class="rewatch-pill">⚡ ${BADGES.quickWatcher} Quick Watcher</span>
        <span class="rewatch-pill">📺 ${BADGES.serialWatcherTiers} Serial Watcher tiers</span>
      </div>
    </div>`;
    document.getElementById('vs-panel').innerHTML=h;
  }
}

// ─── Theme ─────────────────────────────────────────────
const THEME_KEY='tvtracker-theme';
function getStoredTheme(){ try{ return localStorage.getItem(THEME_KEY); }catch(e){ return null; } }
function setStoredTheme(v){ try{ localStorage.setItem(THEME_KEY,v); }catch(e){} }
function applyTheme(theme){
  document.documentElement.setAttribute('data-theme',theme);
  const btn=document.getElementById('theme-toggle');
  btn.textContent=theme==='light'?'🌙':'☀️';
  btn.setAttribute('aria-label',theme==='light'?'Switch to dark theme':'Switch to light theme');
}
function initTheme(){
  const saved=getStoredTheme();
  const theme=saved||((window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark');
  applyTheme(theme);
}
function toggleTheme(){
  const next=document.documentElement.getAttribute('data-theme')==='light'?'dark':'light';
  setStoredTheme(next);
  applyTheme(next);
  render();
}

// ─── Search & status filter ────────────────────────────
let filterState={query:'',status:'all'};
const STATUS_CHIPS=[['all','All'],['active','Active'],['onhold','On hold'],['queue','Up next'],['done','Done'],['dropped','Dropped']];
// Typing re-renders every card, so do it once the keystrokes stop rather than on each
// one — at 339 shows the per-keystroke rebuild is enough to feel laggy.
let searchTimer=null;
function setQuery(v){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{ filterState.query=v; render(); },120);
}
function setStatusFilter(key){ filterState.status=key; render(); }
function clearFilters(){
  clearTimeout(searchTimer);
  filterState={query:'',status:'all'};
  document.getElementById('search').value='';
  render();
}
function renderChips(){
  const row=document.getElementById('chip-row');
  if(!row.children.length){
    row.innerHTML=STATUS_CHIPS.map(([key,label])=>
      `<button type="button" class="chip" data-fkey="chip-${key}" onclick="setStatusFilter('${key}')">${label}</button>`
    ).join('');
  }
  // Toggle the class rather than rebuilding the row — the labels never change, and
  // innerHTML here would throw away the chip the keyboard is currently on.
  STATUS_CHIPS.forEach(([key],i)=>row.children[i].classList.toggle('active',filterState.status===key));
}

// ─── Status breakdown bar ───────────────────────────────
function renderBreakdown(counts){
  const segs=[
    {key:'queue', label:'Up next', value:counts.queue, color:'var(--cat-queue)'},
    {key:'active', label:'Active', value:counts.active, color:'var(--cat-active)'},
    {key:'done', label:'Done', value:counts.done, color:'var(--cat-done)'},
    {key:'onhold', label:'On hold', value:counts.onHold, color:'var(--cat-onhold)'},
    {key:'dropped', label:'Dropped', value:counts.dropped, color:'var(--cat-dropped)'}
  ];
  const total=segs.reduce((s,x)=>s+x.value,0)||1;
  const bar=segs.map(s=>`<div class="seg" style="width:${s.value/total*100}%;background:${s.color}" data-tip="${esc(s.label)}: ${s.value} (${Math.round(s.value/total*100)}%)"></div>`).join('');
  const legend=segs.map(s=>`<button type="button" class="legend-item${filterState.status===s.key?' active':''}" data-fkey="legend-${s.key}" onclick="setStatusFilter('${s.key}')"><span class="swatch" style="background:${s.color}"></span>${esc(s.label)}<span class="legend-n">${s.value}</span></button>`).join('');
  document.getElementById('breakdown').innerHTML=`<div class="breakdown-bar">${bar}</div><div class="legend-row">${legend}</div>`;
}

// ─── Search/filter results (mixes every status into one list) ──
function renderResults(pools,allShows){
  const q=filterState.query.trim().toLowerCase();
  const poolMap={all:allShows,active:pools.active,onhold:pools.onHold,queue:pools.queue,done:pools.done,dropped:pools.dropped};
  const pool=poolMap[filterState.status]||allShows;
  const matches=q?pool.filter(g=>g.t.toLowerCase().includes(q)):pool;
  const sorted=[...matches].sort((a,b)=>{
    if(a.s==='watching'&&b.s==='watching') return effectiveDate(b.lastWatched)-effectiveDate(a.lastWatched);
    if(a.s==='watching') return -1;
    if(b.s==='watching') return 1;
    return a.t.localeCompare(b.t);
  });
  document.getElementById('results-count').textContent=`(${sorted.length})`;
  document.getElementById('results-list').innerHTML=sorted.length?sorted.map(resultCard).join(''):`<div class="empty">No shows match${q?` "${esc(q)}"`:''}.</div>`;
}

// ─── Main render ───────────────────────────────────────
// The stat/legend rows and the cards carry live counts, so they have to be rebuilt via
// innerHTML — which silently drops keyboard focus back to the top of the document.
// Elements worth returning to are tagged data-fkey; this puts focus back afterwards.
function render(){
  const el=document.activeElement;
  const fkey=el&&el.dataset?el.dataset.fkey:null;
  // Also note where it sat among its own kind: an action can remove the focused element
  // outright (Mark finished retires the card), and landing on whatever took its place
  // beats dumping her at the top of a 219-item list on every click.
  let prefix=null,idx=-1;
  if(fkey){
    prefix=fkey.split('-')[0];
    idx=[...document.querySelectorAll(`[data-fkey^="${prefix}-"]`)].indexOf(el);
  }
  renderAll();
  if(!fkey) return;
  const exact=document.querySelector(`[data-fkey="${CSS.escape(fkey)}"]`);
  if(exact){ exact.focus({preventScroll:true}); return; }
  const peers=[...document.querySelectorAll(`[data-fkey^="${prefix}-"]`)];
  const next=peers[Math.min(idx,peers.length-1)];
  if(next) next.focus({preventScroll:true});
}
function renderAll(){
  const shows=liveShows();
  let watching=shows.filter(g=>g.s==='watching');
  const queue=shows.filter(g=>g.s==='queue');
  const done=shows.filter(g=>g.s==='done');
  const dropped=shows.filter(g=>g.s==='dropped');
  const active=watching.filter(g=>!g.dormant);
  const onHold=watching.filter(g=>g.dormant);
  watching=[...active.sort((a,b)=>effectiveDate(b.lastWatched)-effectiveDate(a.lastWatched)),
            ...onHold.sort((a,b)=>effectiveDate(b.lastWatched)-effectiveDate(a.lastWatched))];
  const totalEps=shows.reduce((s,g)=>s+(g.epsWatched||0),0);
  const isFiltering=filterState.query.trim()!==''||filterState.status!=='all';

  renderChips();
  renderBreakdown({active:active.length,onHold:onHold.length,queue:queue.length,done:done.length,dropped:dropped.length});

  document.getElementById('stats').innerHTML=`
    <button type="button" class="stat${filterState.status==='active'?' active':''}" data-fkey="stat-active" style="border-left-color:var(--yellow)" onclick="setStatusFilter('active')"><div class="stat-n" style="color:var(--yellow)">${active.length}</div><div class="stat-l">Active now</div></button>
    <button type="button" class="stat${filterState.status==='onhold'?' active':''}" data-fkey="stat-onhold" style="border-left-color:var(--dim)" onclick="setStatusFilter('onhold')"><div class="stat-n" style="color:var(--dim)">${onHold.length}</div><div class="stat-l">On hold</div></button>
    <button type="button" class="stat${filterState.status==='queue'?' active':''}" data-fkey="stat-queue" style="border-left-color:var(--muted)" onclick="setStatusFilter('queue')"><div class="stat-n" style="color:var(--muted)">${queue.length}</div><div class="stat-l">Up next</div></button>
    <button type="button" class="stat${filterState.status==='done'?' active':''}" data-fkey="stat-done" style="border-left-color:var(--green)" onclick="setStatusFilter('done')"><div class="stat-n" style="color:var(--green)">${done.length}</div><div class="stat-l">Done</div></button>
    <button type="button" class="stat${filterState.status==='dropped'?' active':''}" data-fkey="stat-dropped" style="border-left-color:var(--red)" onclick="setStatusFilter('dropped')"><div class="stat-n" style="color:var(--red)">${dropped.length}</div><div class="stat-l">Dropped</div></button>
    <div class="stat" style="border-left-color:var(--blue)"><div class="stat-n" style="color:var(--blue);font-size:1.1rem">${totalEps.toLocaleString()}</div><div class="stat-l">Total eps</div></div>
  `;

  document.getElementById('default-sections').style.display=isFiltering?'none':'';
  document.getElementById('results-section').style.display=isFiltering?'':'none';

  if(isFiltering){
    renderResults({active,onHold,queue,done,dropped},shows);
  }else{
    // Split the watching list by whether there's actually anything left to watch. Most
    // of the list is shows she finished and never unfollowed in TV Time — surfacing all
    // of them here buries the handful she could actually put on tonight.
    const ready=watching.filter(g=>!isCaughtUp(g));
    const caught=watching.filter(g=>isCaughtUp(g));
    document.getElementById('now-count').textContent=`(${ready.length})`;
    document.getElementById('now').innerHTML=ready.length?ready.map(nowC).join(''):'<div class="empty">Nothing with unwatched episodes — you\'re caught up on everything.</div>';
    document.getElementById('queue').innerHTML=queue.length?queue.map((g,i)=>qC(g,i+1)).join(''):'<div class="empty">Nothing up next.</div>';
    renderCaughtUp(caught);
  }
  renderPanels();
  renderNewReleases();
}

// ─── "New stuff to watch" banner ───────────────────────
// Computed here rather than by the Actions job. The job used to decide this by diffing
// TMDB against shows.json — but shows.json is a frozen export, so its answer was stale
// the moment she watched anything. Here we can compare against her live progress, which
// catches new *episodes* mid-season too, not just whole new seasons.
//
// Keyed by "id:season:ep" so dismissing tonight's alert doesn't swallow next week's.
function releaseKey(r){ return `${r.id}:${r.season}:${r.ep}`; }
function dismissReleases(keys){
  progress.dismissed=[...new Set([...progress.dismissed,...keys])];
  saveProgress();
  document.getElementById('new-releases').style.display='none';
}
// Anything TMDB has aired that she hasn't reached yet.
function unwatchedReleases(){
  const dismissed=loadDismissed();
  const out=[];
  for(const g of liveShows()){
    if(g.s!=='watching') continue;
    const m=SHOW_META[g.id];
    if(!m||!m.lastAired||g.season==null||g.ep==null) continue;
    const {season,ep,airDate}=m.lastAired;
    if(season==null||ep==null) continue;
    // Is the most recently aired episode ahead of where she is?
    const ahead=season>g.season||(season===g.season&&ep>g.ep);
    if(!ahead) continue;
    const r={id:g.id,title:g.t,season,ep,airDate,newSeason:season>g.season};
    if(!dismissed.includes(releaseKey(r))) out.push(r);
  }
  // Newest first — if she's behind on several, the freshest is the interesting one.
  return out.sort((a,b)=>String(b.airDate||'').localeCompare(String(a.airDate||'')));
}
function renderNewReleases(){
  const fresh=unwatchedReleases();
  const el=document.getElementById('new-releases');
  if(!fresh.length){ el.style.display='none'; return; }
  el.style.display='flex';
  el.className='nr-banner';
  const seasons=fresh.filter(r=>r.newSeason).length;
  const title=seasons===fresh.length
    ? `🎉 New season${fresh.length>1?'s':''} out`
    : seasons
      ? '🎉 New episodes & seasons out'
      : `🎉 New episode${fresh.length>1?'s':''} out`;
  el.innerHTML=`<div class="nr-banner-body">
    <div class="nr-banner-title">${title}</div>
    <div class="nr-banner-list">${fresh.slice(0,8).map(r=>
      `${esc(r.title)} — ${r.newSeason?`Season ${r.season}`:`S${r.season}·E${r.ep}`}${r.airDate?` (${fmtDateShort(r.airDate)})`:''}`
    ).join('<br>')}${fresh.length>8?`<br><em>+${fresh.length-8} more</em>`:''}</div>
  </div>
  <button type="button" class="nr-dismiss" onclick='dismissReleases(${JSON.stringify(fresh.map(releaseKey))})'>Got it</button>`;
}

// ─── Sync ──────────────────────────────────────────────
// Points at the Cloudflare Worker that commits progress to the repo's `data` branch.
// The page can't hold a GitHub token (it'd be public), so the Worker holds it instead.
//
// Leaving url empty disables sync entirely and the page falls back to local-only.
//
// The key is public (this page is public). It deters drive-by writes; it does not
// authenticate. The real safety net is that every write is a commit on the data branch.
const SYNC={
  url:'https://steph-tv-tracker-sync.jonny-wilczynski.workers.dev/progress',
  key:'17a6060922fbcb9bea48c3a0efde3033'
};

// Local-first: every change is already in localStorage before any of this runs. Sync is
// a background copy to durable storage, never something she waits on.
let syncTimer=null,syncing=false,syncAgain=false;
function setSyncState(s){
  const el=document.getElementById('sync-status');
  if(!el) return;
  if(!SYNC.url){ el.textContent=""; return; }
  const label={saving:'Saving…',saved:'✓ Backed up',offline:'Saved on this device — will back up when online'};
  el.textContent=label[s]||'';
  el.className='sync-status'+(s==='offline'?' warn':'');
}
// The Worker returns the merged truth; adopting it is how a second device (or a browser
// whose storage was cleared) picks up everything it was missing.
function adoptProgress(merged){
  if(!merged||typeof merged!=='object') return;
  progress={...emptyProgress(),...merged};
  overrides=progress.overrides;
  try{ localStorage.setItem(PROGRESS_KEY,JSON.stringify(progress)); }catch(e){}
  render();
}
async function pushSync(){
  if(!SYNC.url) return;
  if(syncing){ syncAgain=true; return; }
  syncing=true;
  setSyncState('saving');
  try{
    const res=await fetch(SYNC.url,{
      method:'POST',
      headers:{'Content-Type':'application/json','X-Sync-Key':SYNC.key},
      body:JSON.stringify(progress)
    });
    if(!res.ok) throw new Error('sync '+res.status);
    adoptProgress(await res.json());
    setSyncState('saved');
  }catch(e){
    // Offline or the Worker is down: her data is still in localStorage and the next
    // change (or the next load) retries. Never surface this as lost.
    console.warn('sync failed, will retry',e);
    setSyncState('offline');
  }finally{
    syncing=false;
    if(syncAgain){ syncAgain=false; queueSync(); }
  }
}
function queueSync(){
  if(!SYNC.url) return;
  clearTimeout(syncTimer);
  syncTimer=setTimeout(pushSync,1500);
}
// Marking an episode and immediately switching apps is the normal case on a phone, so
// don't let a pending debounce be the thing that loses it.
function flushSync(){
  if(!SYNC.url||syncing) return;
  clearTimeout(syncTimer);
  const body=JSON.stringify(progress);
  // keepalive caps the body at 64KB; past that it would fail silently, so fall through
  // to a normal request and accept it may be cut short — the next load re-syncs anyway.
  try{
    fetch(SYNC.url,{
      method:'POST',
      keepalive:body.length<60000,
      headers:{'Content-Type':'application/json','X-Sync-Key':SYNC.key},
      body
    });
  }catch(e){}
}
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='hidden') flushSync(); });
window.addEventListener('pagehide',flushSync);

// ─── Bootstrap ─────────────────────────────────────────
// Theme goes first and synchronously: it only depends on localStorage, so waiting on
// the show fetch just means a visible flash of the wrong palette on every load.
initTheme();
Promise.all([
  fetch('shows.json').then(r=>r.json()),
  fetch('posters.json').then(r=>r.ok?r.json():{}).catch(()=>({})),
  fetch('episode-counts.json').then(r=>r.ok?r.json():{}).catch(()=>({})),
  fetch('show-meta.json').then(r=>r.ok?r.json():{}).catch(()=>({}))
]).then(([showsData,postersData,episodeCountsData,metaData])=>{
  SH=showsData;
  POSTERS=postersData;
  EPISODE_COUNTS=episodeCountsData;
  SHOW_META=metaData;
  render();
  // Pull on load by pushing: the Worker merges and hands back the truth. This is what
  // restores her progress on a browser whose storage was cleared, and what picks up
  // changes she made on the other device.
  pushSync();
}).catch(err=>{
  console.error('Failed to load show data', err);
  document.getElementById('now').innerHTML='<div class="empty">Couldn\'t load show data — try refreshing the page.</div>';
});
</script>
</body>
</html>
