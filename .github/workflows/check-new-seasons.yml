name: Check for new seasons

on:
  schedule:
    - cron: '0 13 * * *'   # daily, ~1pm UTC
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check TMDB for new seasons
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: node scripts/check-new-seasons.mjs

      - name: Commit results if anything changed
        run: |
          git config user.name "tv-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add new-releases.json tmdb-map.json posters.json
          git diff --staged --quiet || git commit -m "Update new-season and poster data"
          git push
